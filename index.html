<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estación Arcade</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <h1>🎮 Estación Arcade</h1>
  <p>Los mejores videojuegos en un solo lugar</p>
</header>

<section class="juegos">
  <div class="card">
    <img src="imagenes/GodOfWare.jpg" alt="Juego 1">
    <h3>God of War</h3>

  </div>

  <div class="card">
    <img src="imagenes/Fifa26.avif" alt="Juego 2">
    <h3>FIFA 26</h3>
  
  </div>
  
  <div class="card">
    <img src="imagenes/CallOfDuty3.jpg" alt="Juego 3">
    <h3>Call of Duty:black ops 3</h3>
  
  </div>

</section>

<section class="videos">
  <h2>🎥 Trailers</h2>

  <video controls>
    <source src="/pagina/videos/GodOfWare.mp4" type="video/mp4">
  </video>

  <video controls>
    <source src="/pagina/videos/Fifa26.mp4" type="video/mp4">
  </video>

  <iframe src="https://www.youtube.com/embed/cUeA0SNWEB4?si=pQwLjrNiyqdsqhjr" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</section>

<section class="contacto">
  <h2>📩 Contáctanos</h2>
  <form action="gracias.html">
    <input type="text" placeholder="Nombre" required>
    <input type="email" placeholder="Correo" required>
    <textarea placeholder="Mensaje" required></textarea>
    <button type="submit">Enviar</button>
  </form>
</section>

<footer>
  <p>© 2026 Estación Arcade</p>
</footer>

</body>
</html>
